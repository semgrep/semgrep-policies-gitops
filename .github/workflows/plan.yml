# Plan on every pull request: dry-run the policy bundles against the live
# deployment and fail if the PR would change anything the reviewer cannot
# see. This is the "review the diff before applying" gate.
name: plan

on:
  pull_request:
    paths:
      - "policies/**"
      - "reconciler/**"

permissions:
  contents: read

concurrency:
  # One plan per PR; a new push supersedes an in-flight run.
  group: semgrep-policies-plan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      # Pin every action to a full commit SHA (a tag is mutable). The
      # human-readable version is in the trailing comment.
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen
      - name: Plan
        env:
          # The token is a repository secret, never committed. It needs a
          # Semgrep web API token for a deployment on the Unified Policies
          # model.
          SEMGREP_API_TOKEN: ${{ secrets.SEMGREP_API_TOKEN }}
          SEMGREP_DEPLOYMENT_ID: ${{ vars.SEMGREP_DEPLOYMENT_ID }}
          # Defaults to https://semgrep.dev when the variable is unset.
          SEMGREP_APP_URL: ${{ vars.SEMGREP_APP_URL }}
        # No --fail-on-diff: a pending diff is the change under review, not a
        # failure. Only an invalid bundle (a validation error) fails the run.
        run: uv run python -m reconciler.cli plan --deployment-id "$SEMGREP_DEPLOYMENT_ID"
