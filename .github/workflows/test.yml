# Unit tests for the reconciler code. Kept separate from validate.yml so a
# policy-only PR is gated purely on the policy files (validate + plan) and
# is not affected by the code test suite — and vice versa.
name: test

on:
  pull_request:
    paths:
      - "reconciler/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen
      - run: uv run pytest -q
