# Nightly drift detection. Read-only: it dry-runs the repo's policies
# against the live deployment and fails if they diverge — e.g. someone
# edited a policy in the Semgrep UI out of band. It never writes; applies
# happen only on merge (see apply.yml). A failed run is the signal to
# investigate and either revert the UI change or commit it to the repo.
name: drift

on:
  schedule:
    # Nightly (07:00 UTC).
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # A manual dispatch should not overlap the scheduled run.
  group: semgrep-policies-drift
  cancel-in-progress: false

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv sync --frozen
      - name: Detect drift
        env:
          SEMGREP_API_TOKEN: ${{ secrets.SEMGREP_API_TOKEN }}
          SEMGREP_DEPLOYMENT_ID: ${{ vars.SEMGREP_DEPLOYMENT_ID }}
          # Defaults to https://semgrep.dev when the variable is unset.
          SEMGREP_APP_URL: ${{ vars.SEMGREP_APP_URL }}
        # --fail-on-diff makes drift (an out-of-band UI change) fail the run.
        run: uv run python -m reconciler.cli plan --fail-on-diff --deployment-id "$SEMGREP_DEPLOYMENT_ID"
