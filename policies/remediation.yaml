# Remediation policies: what happens when a finding matches.
#
# Each policy is a filter (conditions over finding attributes) plus actions.
# `slug` is the stable identity: omit it on a new policy to derive it from
# the name, and never change it afterward (renaming `name` keeps `slug`).
#
# Read GET .../vocab?product=remediation for the accepted condition types,
# action types, and value enums. Note that `block` requires a companion
# `pr_comment` action in the same policy.
policies:
  - name: Block high-confidence criticals
    active: true
    filters:
      mode: all
      conditions:
        - type: severity
          values: [critical, high]
        - type: confidence
          values: [high]
    actions:
      - type: block
      - type: pr_comment
  - name: Comment on medium findings
    active: true
    filters:
      mode: all
      conditions:
        - type: severity
          values: [medium]
    actions:
      - type: pr_comment
  - name: Comment on high-severity findings
    active: true
    filters:
      mode: all
      conditions:
        - type: severity
          values: [high]
    actions:
      - type: pr_comment
  # Gate the most dangerous injection classes. `vulnerability_class` is a SAST
  # (Semgrep Code) condition derived from each rule's CWE metadata; its accepted
  # values are the vulnerability classes published by the vocab endpoint. Values
  # are quoted because some contain spaces and parentheses.
  - name: Block high-impact injection classes
    active: true
    filters:
      mode: all
      conditions:
        - type: vulnerability_class
          values:
            - "SQL Injection"
            - "Command Injection"
            - "Code Injection"
            - "Server-Side Request Forgery (SSRF)"
            - "Path Traversal"
    actions:
      - type: block
      - type: pr_comment
